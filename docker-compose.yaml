services:
  # 1. YOUR SPARK WORKER
  spark-job:
    build: .
    container_name: ironman-spark
    volumes:
      - ./src:/home/jovyan/src
      - ./keys/gcp-creds.json:/tmp/keys/gcp-creds.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/gcp-creds.json
      - GCP_PROJECT_ID=pulse-stream-core
    command: tail -f /dev/null

  # 2. AIRFLOW DATABASE
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"

  # 3. AIRFLOW ORCHESTRATOR
  airflow:
    build: 
      context: .
      dockerfile: Dockerfile.airflow
    container_name: ironman-airflow
    depends_on:
      - postgres
      - spark-job
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --firstname Sagar --lastname Patel --role Admin --email admin@example.com --password admin &&
      airflow webserver -D &&
      airflow scheduler
      "