services:
  # 1. YOUR SPARK WORKER
  spark-job:
    build: .
    container_name: ironman-spark
    restart: unless-stopped
    volumes:
      - ./src:/home/jovyan/src
      - ./keys/gcp-creds.json:/tmp/keys/gcp-creds.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/tmp/keys/gcp-creds.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    command: tail -f /dev/null

  # 2. AIRFLOW DATABASE
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # 3. AIRFLOW ORCHESTRATOR
  airflow:
    build: 
      context: .
      dockerfile: Dockerfile.airflow
    container_name: ironman-airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      spark-job:
        condition: service_started
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password ${AIRFLOW_ADMIN_PASSWORD} &&
      airflow webserver -D &&
      airflow scheduler
      "
